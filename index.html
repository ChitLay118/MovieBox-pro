<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">WY MovieBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./firebase-config.js"></script>
    
    <link rel="stylesheet" href="style.css?v=6.0">
</head>
<body id="body-root" class="bg-darkbg text-white min-h-screen pb-20 transition-colors duration-300">

    <!-- Simple Alert Component -->
    <div id="simple-alert" class="hidden"></div>

    <!-- Login Screen (Modernized) -->
    <div id="login-screen" class="fixed inset-0 bg-gradient-to-br from-darkbg via-darkbg to-midbg z-[100] flex flex-col items-center justify-center p-4 overflow-hidden">
        <!-- Animated Background Elements -->
        <div class="absolute top-0 left-0 w-96 h-96 bg-primary/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 animate-pulse"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl translate-x-1/2 translate-y-1/2 animate-pulse" style="animation-delay: 1s;"></div>

        <div class="w-full max-w-sm relative z-10">
            <div class="login-card p-8 rounded-3xl backdrop-blur-xl border border-white/10 shadow-2xl">
                <!-- Logo with Animation -->
                <div class="flex justify-center mb-6">
                    <div class="relative">
                        <div class="absolute inset-0 bg-gradient-to-r from-primary to-cyan-400 rounded-2xl blur-lg opacity-50"></div>
                        <img 
                            src="https://i.ibb.co/3mm1SwVj/photo-2025-09-26-02-06-35.jpg" 
                            alt="WY MovieBox Icon" 
                            class="relative w-24 h-24 rounded-2xl border-2 border-primary p-1 object-cover shadow-2xl transition duration-500 hover:scale-110 hover:rotate-3"
                            onerror="this.onerror=null; this.src='https://placehold.co/80x80/0c4a6e/ffffff?text=Icon';"
                        >
                    </div>
                </div>

                <!-- Title -->
                <h1 class="text-3xl font-extrabold text-center mb-2 bg-gradient-to-r from-primary to-cyan-400 bg-clip-text text-transparent">
                    WY MovieBox
                </h1>
                <p class="text-center text-slate-400 text-sm mb-6" id="form-title">
                    ဝင်ရောက်ကြည့်ရှုရန် အချက်အလက်များ ထည့်ပါ။
                </p>

                <!-- Auth Form -->
                <form id="auth-form" class="space-y-4">
                    <div id="username-field" style="display: none;" class="animate-fadeIn">
                        <label for="username" class="block text-sm font-semibold text-slate-300 mb-2">
                            အသုံးပြုသူအမည် (Name)
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="သင်၏အမည်"
                            class="animated-input w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                        >
                    </div>
                    
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">
                            အီးမေးလ်
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="ဥပမာ: moviebox@gmail.com"
                            class="animated-input w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                            required
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-300 mb-2">
                            စကားဝှက်
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="စကားဝှက်ကို ရိုက်ထည့်ပါ"
                            class="animated-input w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all"
                            required
                        >
                    </div>

                    <button 
                        type="submit" 
                        class="login-button w-full text-white font-bold py-3 rounded-lg shadow-lg focus:outline-none focus:ring-4 focus:ring-primary/50 transition-all duration-200 hover:shadow-xl hover:shadow-primary/50 active:scale-95"
                        id="submit-button"
                    >
                        ဝင်ရောက်ပါ
                    </button>
                </form>

                <!-- Links -->
                <div class="mt-6 space-y-3">
                    <div class="text-center">
                        <a href="#" class="text-sm font-medium text-primary hover:text-cyan-300 transition duration-150 ease-in-out" onclick="resetPassword()">
                            စကားဝှက်မေ့နေပါသလား?
                        </a>
                    </div>
                    
                    <div class="text-center text-xs text-slate-400">
                        <span id="toggle-prompt">အကောင့်မရှိသေးဘူးလား?</span>
                        <a href="#" class="font-medium text-primary hover:text-cyan-300 transition duration-150 ease-in-out ml-1" id="toggle-link">
                            အကောင့်အသစ်ဖွင့်ပါ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ad Modal (Improved) -->
    <div id="ad-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[90] flex items-center justify-center p-4 animate-fadeIn">
        <div class="bg-midbg rounded-2xl max-w-2xl w-full relative overflow-hidden shadow-2xl border border-white/10">
            <button onclick="closeAdModal()" class="absolute top-4 right-4 z-10 bg-primary/80 hover:bg-primary text-white p-2 rounded-full transition-all duration-200 hover:scale-110">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            </button>
            <div id="ad-content" class="p-6">
                <!-- Ad content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Notification Sidebar (Improved) -->
    <div id="noti-modal" class="hidden fixed inset-0 z-[110]">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleNotiModal()"></div>
        <div class="absolute right-0 top-0 h-full w-80 bg-midbg shadow-2xl p-6 flex flex-col border-l border-gray-700 animate-slide-left">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">အကြောင်းကြားစာများ</h2>
                <button onclick="toggleNotiModal()" class="text-gray-400 hover:text-white text-2xl transition-colors">✕</button>
            </div>
            <div id="noti-list" class="flex-1 overflow-y-auto space-y-3">
                <p class="text-gray-500 text-center text-sm">အကြောင်းကြားစာမရှိသေးပါ။</p>
            </div>
        </div>
    </div>

    <!-- Main App (Initially Hidden) -->
    <div id="main-app" class="hidden">
        <!-- Header (Sticky) -->
        <header id="header-sticky" class="sticky top-0 z-50 bg-darkbg/95 backdrop-blur-md p-4 border-b border-gray-700/50 shadow-xl transition-all">
            <div class="max-w-6xl mx-auto flex justify-between items-center h-8">
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-primary to-cyan-400 bg-clip-text text-transparent" data-i18n="title">WY MovieBox</h1>
                
                <!-- Header Actions -->
                <div class="flex items-center gap-4">
                    <!-- Search Button (New) -->
                    <button onclick="toggleSearchModal()" class="text-gray-400 hover:text-primary transition-colors p-2 rounded-lg hover:bg-gray-800/50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>

                    <!-- Notification Bell -->
                    <button onclick="toggleNotiModal()" class="relative text-gray-400 hover:text-primary transition-colors p-2 rounded-lg hover:bg-gray-800/50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span id="noti-badge" class="hidden absolute top-1 right-1 bg-red-600 w-2.5 h-2.5 rounded-full border-2 border-darkbg"></span>
                    </button>
                </div>
            </div>
            
            <!-- Category Menu -->
            <div id="menu-bar" class="max-w-6xl mx-auto mt-4 flex space-x-2 overflow-x-auto whitespace-nowrap py-2 pointer-events-none opacity-50 scrollbar-hide">
                <button class="menu-btn active-category active-category-blue text-white font-semibold px-4 py-2 rounded-full text-sm transition-all duration-200 hover:opacity-90 flex-shrink-0" data-category="action" onclick="showCategory('action', this)">လှုပ်ရှားမှု</button>
                <button class="menu-btn bg-gray-800 text-white font-semibold px-4 py-2 rounded-full text-sm transition-all duration-200 hover:bg-gray-700 flex-shrink-0" data-category="drama" onclick="showCategory('drama', this)">ဒရာမာ</button>
                <button class="menu-btn bg-gray-800 text-white font-semibold px-4 py-2 rounded-full text-sm transition-all duration-200 hover:bg-gray-700 flex-shrink-0" data-category="cartoon" onclick="showCategory('cartoon', this)">ကာတွန်း</button>
                <button class="menu-btn bg-gray-800 text-white font-semibold px-4 py-2 rounded-full text-sm transition-all duration-200 hover:bg-gray-700 flex-shrink-0" data-category="romance" onclick="showCategory('romance', this)">အချစ်</button>
                <button class="menu-btn bg-gray-800 text-white font-semibold px-4 py-2 rounded-full text-sm transition-all duration-200 hover:bg-gray-700 flex-shrink-0" data-category="myanmar" onclick="showCategory('myanmar', this)">မြန်မာ</button>
            </div>
        </header>

        <!-- Search Modal (New) -->
        <div id="search-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[95] flex items-start justify-center p-4 pt-20">
            <div class="w-full max-w-2xl bg-midbg rounded-2xl p-6 shadow-2xl border border-white/10 animate-fadeIn">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-white">ရုပ်ရှင်ရှာဖွေခြင်း</h3>
                    <button onclick="toggleSearchModal()" class="text-gray-400 hover:text-white">✕</button>
                </div>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="ရုပ်ရှင်အမည်ကို ရိုက်ထည့်ပါ..."
                    class="w-full px-4 py-3 bg-darkbg border border-gray-700 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-primary"
                    oninput="performSearch(this.value)"
                >
                <div id="search-results" class="mt-4 max-h-96 overflow-y-auto space-y-2">
                    <!-- Search results will appear here -->
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main id="main-content" class="max-w-full mx-auto px-4 min-h-[calc(100vh-160px)] flex flex-col">
            <!-- Video Player -->
            <div id="player-container" class="w-full max-w-4xl mx-auto rounded-2xl overflow-hidden relative shadow-2xl shadow-primary/30 bg-black mt-4 mb-6 aspect-video sticky top-[135px] z-40 border border-primary/20">
                <iframe id="iframePlayer" class="w-full h-full absolute top-0 left-0" 
                        src="" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
                <button onclick="toggleFullScreen()" class="absolute top-4 right-4 bg-black/70 hover:bg-primary/80 p-2 rounded-full text-white transition-all duration-200 hover:scale-110 z-40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
            </div>
            
            <!-- Movie Info Bar -->
            <div class="max-w-4xl mx-auto flex justify-between items-center mt-0 mb-6 px-2 w-full z-30">
                <p id="current-movie-title" class="text-xl font-semibold text-white/90">ရုပ်ရှင်ကို ရွေးချယ်ပါ</p>
                <button id="favorite-btn" onclick="toggleFavorite()" class="p-3 rounded-full transition-all duration-300 shadow-lg text-gray-500 hover:text-red-500 hover:scale-110 hover:bg-red-500/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </button>
            </div>

            <!-- Movies Grid -->
            <section id="movies" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 justify-items-center flex-grow px-0 pt-4">
                <div id="loading-indicator" class="col-span-full flex flex-col items-center justify-center w-full h-20 text-gray-400">
                    <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <p class="mt-2 text-sm">ဒေတာများ တင်နေပါသည်...</p>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 bg-midbg/95 backdrop-blur-md border-t border-gray-700/50 shadow-2xl shadow-black/80 z-50 pointer-events-none opacity-50">
            <div class="max-w-xl mx-auto flex justify-around items-center h-16">
                <button class="nav-btn flex flex-col items-center justify-center space-y-1 p-2 text-primary font-bold transition-all duration-200 hover:scale-110" data-nav="home" onclick="changeNav(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 17v-6l2-2 2 2v6h5V8l-7-6-7 6v9h5z"/></svg>
                    <span class="text-xs">Home</span>
                </button>
                
                <button class="nav-btn flex flex-col items-center justify-center space-y-1 p-2 text-gray-400 hover:text-white transition-all duration-200 hover:scale-110" data-nav="trending" onclick="changeNav(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 1.5l-4 4-4-4M6.5 18.5l4-4 4 4M1 12h22"/></svg>
                    <span class="text-xs">Trending</span>
                </button>

                <button class="nav-btn flex flex-col items-center justify-center space-y-1 p-2 text-gray-400 hover:text-white transition-all duration-200 hover:scale-110" data-nav="favorites" onclick="changeNav(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span class="text-xs">Favorites</span>
                </button>

                <button class="nav-btn flex flex-col items-center justify-center space-y-1 p-2 text-gray-400 hover:text-white transition-all duration-200 hover:scale-110" data-nav="profile" onclick="changeNav(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="text-xs">Profile</span>
                </button>

                <button id="admin-btn" class="nav-btn hidden flex flex-col items-center justify-center space-y-1 p-2 text-gray-400 hover:text-primary transition-all duration-200 hover:scale-110" data-nav="admin" onclick="changeNav(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                    <span class="text-xs">Admin</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Scripts -->
    <script type="module" src="./auth.js"></script>
    <script type="module" src="./admin.js"></script>
    <script type="module" src="./ad-manager.js"></script>
    <script src="./script.js"></script>
</body>
</html>
